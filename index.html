<meta charset="utf-8">
<title>Metaphors of AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Text:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:#000;}
  @page{size:2248px 2700px;margin:0;}
  @media print{html,body{background:#000;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .board{margin:0 !important;box-shadow:none !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}}
  .board{position:relative;width:2240px;height:2640px;margin:24px auto;background:#000;
    color:#fff;font-family:'Google Sans Text','Google Sans',Helvetica,Arial,sans-serif;overflow:hidden;
    box-shadow:0 18px 60px rgba(0,0,0,.7);}
  .title{position:absolute;top:48px;left:60px;text-align:left;text-transform:uppercase;
    font-family:'Google Sans',sans-serif;font-weight:700;font-size:96px;line-height:.84;
    letter-spacing:-4px;color:#fff;}
  .subtitle{position:absolute;top:188px;right:64px;width:560px;text-align:right;
    font-size:19px;line-height:1.45;color:#9a9a9a;}
  .axt{position:absolute;font-family:'Google Sans',sans-serif;font-size:15px;font-weight:600;
    letter-spacing:2.5px;text-transform:uppercase;color:#bcbcbc;white-space:nowrap;}
  .ql{position:absolute;font-family:'Google Sans',sans-serif;color:#fff;pointer-events:none;}
  .ql b{display:block;font-weight:700;font-size:25px;letter-spacing:0;text-transform:uppercase;}
  .ql span{display:block;font-family:'Google Sans Text',sans-serif;font-size:13px;
    color:#787878;margin-top:4px;letter-spacing:0;text-transform:none;}
  .item{position:absolute;display:flex;flex-direction:column;align-items:center;}
  .glow{position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);z-index:0;
    background:radial-gradient(ellipse at center,rgba(255,255,255,.20),rgba(255,255,255,0) 70%);}
  .item img{display:block;position:relative;z-index:1;
    filter:drop-shadow(0 0 8px rgba(0,0,0,.6));}
  .cap{position:relative;z-index:2;margin-top:7px;font-family:'Google Sans',sans-serif;font-weight:500;
    font-size:12.5px;line-height:1.18;text-align:center;color:#fff;max-width:170px;text-wrap:balance;
    text-shadow:0 1px 6px #000;}
  .badge{position:absolute;z-index:3;width:26px;height:26px;border-radius:50%;background:#fff;
    color:#000;font-family:'Google Sans',sans-serif;font-weight:700;font-size:13px;
    display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 3px #000;}
  .row{display:flex;gap:11px;width:292px;margin-bottom:10px;align-items:flex-start;}
  .rtx{flex:1;min-width:0;overflow-wrap:break-word;}
  .rnum{flex:0 0 26px;height:26px;border-radius:50%;border:1.5px solid #fff;color:#fff;
    font-family:'Google Sans',sans-serif;font-weight:600;font-size:12px;display:flex;align-items:center;
    justify-content:center;margin-top:2px;}
  .rtx b{font-family:'Google Sans',sans-serif;font-weight:600;font-size:14px;display:block;line-height:1.18;color:#fff;overflow-wrap:break-word;}
  .rtx p{margin:3px 0 0;font-size:12px;line-height:1.3;color:#9a9a9a;overflow-wrap:break-word;}
  .foot{position:absolute;bottom:20px;left:0;width:100%;text-align:center;font-size:13px;
    color:#6e6e6e;}
  .cite{font-family:'Google Sans Text',sans-serif;font-weight:500;font-size:12px;color:#909090;}
  .refhead{position:absolute;font-family:'Google Sans',sans-serif;font-weight:700;font-size:15px;
    letter-spacing:2px;text-transform:uppercase;color:#fff;}
  .refnote{position:absolute;font-size:12.5px;color:#8a8a8a;}
  .bibentry{font-family:'Google Sans Text',sans-serif;font-size:10px;line-height:1.3;
    color:#8d8d8d;margin-bottom:7px;break-inside:avoid;}
  .bibentry .bn{color:#e8e8e8;font-weight:500;}
  .bibentry .bln{color:#8aa0c8;text-decoration:none;}
  .imgcred{font-family:'Google Sans Text',sans-serif;font-size:9.5px;line-height:1.3;
    color:#7e7e7e;margin-bottom:6px;break-inside:avoid;}
  .imgcred .ic{color:#cfcfcf;font-weight:500;}
</style>
<div class="board" id="board"></div>
<script src="points.js"></script>
<script>
const M=window.MATRIX, board=document.getElementById("board");
const NS="http://www.w3.org/2000/svg";
const BW=2240, BH=2640;
const MX0=480, MX1=1760, MY0=320, MY1=1900;
const cx=(MX0+MX1)/2, cy=(MY0+MY1)/2;
const HERO={ "wild-animal":116,robots:106,parrot:98,brain:108,overlord:118,hurricane:108,"black-box":92,genie:84,midas:98,pandora:94,"domestic-animal":108,god:94,"guardian-angel":94,singularity:104,"job-killer":108,"ai-lover":104,"code-monkey":96,golem:104,frankenstein:102,"ghost-work":104,centaur:106,alchemy:98,electricity:96,cyborg:98,intern:96,bullshitter:110,eliza:92 };
const svg=document.createElementNS(NS,"svg");
svg.setAttribute("width",BW); svg.setAttribute("height",BH);
svg.style.cssText="position:absolute;top:0;left:0;pointer-events:none";
board.appendChild(svg);
function ln(x1,y1,x2,y2,st,w,extra){const l=document.createElementNS(NS,"line");
  l.setAttribute("x1",x1);l.setAttribute("y1",y1);l.setAttribute("x2",x2);l.setAttribute("y2",y2);
  l.setAttribute("stroke",st);l.setAttribute("stroke-width",w);if(extra)for(const k in extra)l.setAttribute(k,extra[k]);svg.appendChild(l);}
for(let x=MX0;x<=MX1+0.5;x+=38) ln(x,MY0,x,MY1,"rgba(255,255,255,0.05)",1);
for(let y=MY0;y<=MY1+0.5;y+=38) ln(MX0,y,MX1,y,"rgba(255,255,255,0.05)",1);
const defs=document.createElementNS(NS,"defs");
defs.innerHTML='<marker id="ah" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 2L8 5L2 8" fill="none" stroke="#777" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>';
svg.appendChild(defs);
ln(cx,MY0-14,cx,MY1+14,"#555",1.6,{"marker-start":"url(#ah)","marker-end":"url(#ah)"});
ln(MX0-14,cy,MX1+14,cy,"#555",1.6,{"marker-start":"url(#ah)","marker-end":"url(#ah)"});
function el(html){const t=document.createElement("template");t.innerHTML=html.trim();board.appendChild(t.content.firstChild);}
const _tw=M.meta.title.split(' '); el('<div class="title">'+_tw[0]+'<br>'+_tw.slice(1).join(' ')+'</div>');
el('<div class="subtitle">'+M.meta.subtitle+' <span class="cite">['+(M.meta.frameRefs||[M.meta.frameRef]).join(', ')+']</span></div>');
el('<div class="axt" style="top:'+(MY0-58)+'px;left:0;width:100%;text-align:center;">'+M.meta.axes.y.high+'</div>');
el('<div class="axt" style="top:'+(MY1+46)+'px;left:0;width:100%;text-align:center;">'+M.meta.axes.y.low+'</div>');
el('<div class="axt" style="top:'+(cy-34)+'px;left:'+(MX0-2)+'px;">'+M.meta.axes.x.low+'</div>');
el('<div class="axt" style="top:'+(cy-34)+'px;left:'+(MX1-200)+'px;width:200px;text-align:right;">'+M.meta.axes.x.high+'</div>');
const QP={blind_force:[MX0+16,MY0+8,'left'],overlord:[MX1-16,MY0+8,'right'],humble_tool:[MX0+16,MY1-60,'left'],protector:[MX1-16,MY1-60,'right']};
for(const k in M.meta.quadrants){const q=M.meta.quadrants[k],p=QP[k];
  el('<div class="ql" style="top:'+p[1]+'px;'+(p[2]=='left'?'left:'+p[0]+'px;text-align:left;':'left:'+(p[0]-260)+'px;width:260px;text-align:right;')+'"><b>'+q.label+'</b><span>'+q.note+'</span></div>');}
el('<div class="foot">Charlie Stein &amp; Alexander Doudkin, 2026  ·  inspired by Disnovation.org  ·  image credits in the accompanying essay</div>');
el('<div style="position:absolute;left:52px;top:2030px;width:2136px;height:1px;background:#2b2b2b;"></div>');
el('<div class="refhead" style="left:52px;top:2050px;">References &amp; further reading</div>');
el('<div class="refnote" style="left:412px;top:2052px;width:1400px;">The metaphors are drawn from the literature; each entry lists a source and a short link to it.</div>');
(function(){const c=document.createElement("div");
  c.style.cssText="position:absolute;left:52px;top:2090px;width:2136px;column-count:5;column-gap:38px;";
  M.meta.bibliography.forEach(b=>{const e=document.createElement("div");e.className="bibentry";
    e.innerHTML='<span class="bn">['+b.n+']</span> '+b.ref+(b.link?' <a class="bln" href="'+(b.url||('https://'+b.link))+'">'+b.link+'</a>':'');c.appendChild(e);});
  board.appendChild(c);})();

const pts=M.points.map(p=>({p,tx:MX0+p.position.nx*(MX1-MX0),ty:MY1-p.position.ny*(MY1-MY0),
  cxp:0,cyp:0,hw:0,hh:0,h:HERO[p.id]||76,img:null}));
pts.forEach(o=>{o.cxp=o.tx;o.cyp=o.ty;});
let loaded=0;
pts.forEach(o=>{const im=new Image();o.img=im;
  im.onload=im.onerror=()=>{const r=(im.naturalWidth||1)/(im.naturalHeight||1);
    o.w=o.h*r; o.hw=Math.max(o.w/2,64)+34; o.hh=o.h/2+42; if(++loaded===pts.length) layout();};
  im.src=o.p.image_cutout;});
function layout(){
  const OBST=[
    [MX0+8,MY0+2,MX0+330,MY0+106],    // top-left  (Silly tool)
    [MX1-400,MY0+2,MX1-8,MY0+106],    // top-right (Menacing overlord)
    [MX0+8,MY1-106,MX0+370,MY1-2],    // bot-left  (Humble servant)
    [MX1-440,MY1-106,MX1-8,MY1-2],    // bot-right (Omnipotent protector)
    [MX0-6,cy-48,MX0+120,cy+12],      // axis label: WEAK
    [MX1-184,cy-48,MX1+6,cy+12],      // axis label: OMNIPOTENT
  ];
  for(let it=0;it<560;it++){
    for(const a of pts){a.cxp+=(a.tx-a.cxp)*0.012; a.cyp+=(a.ty-a.cyp)*0.012;}
    for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){
      const a=pts[i],b=pts[j];let dx=b.cxp-a.cxp,dy=b.cyp-a.cyp;
      if(dx===0&&dy===0){dx=(i-j);}
      const ox=(a.hw+b.hw)-Math.abs(dx), oy=(a.hh+b.hh)-Math.abs(dy);
      if(ox>0&&oy>0){ if(ox<oy){const s=(dx<0?-1:1)*ox/2; a.cxp-=s; b.cxp+=s;}
        else{const s=(dy<0?-1:1)*oy/2; a.cyp-=s; b.cyp+=s;} }}
    for(const a of pts)for(const o of OBST){
      const ox=Math.min(a.cxp+a.hw,o[2])-Math.max(a.cxp-a.hw,o[0]);
      const oy=Math.min(a.cyp+a.hh,o[3])-Math.max(a.cyp-a.hh,o[1]);
      if(ox>0&&oy>0){ if(ox<oy){a.cxp += (a.cxp<(o[0]+o[2])/2 ? -ox : ox);}
        else{a.cyp += (a.cyp<(o[1]+o[3])/2 ? -oy : oy);} }}
    for(const a of pts){a.cxp=Math.max(MX0+a.hw,Math.min(MX1-a.hw,a.cxp));
      a.cyp=Math.max(MY0+a.hh,Math.min(MY1-a.hh,a.cyp));}
  }
  for(const o of pts){
    const d=document.createElement("div");d.className="item";
    d.style.left=(o.cxp-102)+"px"; d.style.top=(o.cyp-o.hh+10)+"px"; d.style.width="204px";
    const g=Math.max(o.w,o.h)*1.5;
    const onLeft=(o.cxp - o.w/2 - 44) > MX0;
    const bx = onLeft ? (66 - o.w/2) : (112 + o.w/2);
    const bt = (o.h/2 - 13);
    d.innerHTML='<div class="glow" style="width:'+g+'px;height:'+g+'px;"></div>'
      +'<img src="'+o.p.image_cutout+'" style="height:'+o.h+'px;width:auto;">'
      +'<div class="cap">'+o.p.name+'</div>'
      +'<div class="badge" style="left:'+bx+'px;top:'+bt+'px;">'+o.p.number+'</div>';
    board.appendChild(d);
  }
  ["left","right"].forEach(side=>{
    const col=M.points.filter(p=>p.side===side).sort((a,b)=>a.number-b.number);
    const X= side==="left" ? 52 : 1800;
    const wrap=document.createElement("div");
    wrap.style.cssText="position:absolute;left:"+X+"px;top:334px;width:292px;";
    col.forEach(p=>{
      const row=document.createElement("div");row.className="row";
      const cites=(p.references&&p.references.length)?' <span class="cite">['+p.references.join(', ')+']</span>':'';
      row.innerHTML='<div class="rnum">'+p.number+'</div>'
        +'<div class="rtx"><b>'+p.name+cites+'</b><p>'+p.description+'</p></div>';
      wrap.appendChild(row);});
    board.appendChild(wrap);
  });
}
</script>
